<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>シンプルなホームページ</title>

  <!-- 人気のあるWEBフォント（例：Noto Sans JP） -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Noto Sans JP', sans-serif;
      color: #ffffff;
      text-align: center;

      /* バックグラウンドテクスチャ */
      background-image: url("https://drive.google.com/uc?export=view&id=1eoUFTq_k19y0bdGXJ_8TOnMMuukRLNO7");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .container {
      background: rgba(0, 0, 0, 0.5);
      padding: 40px 60px;
      border-radius: 16px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 2.4rem;
      font-weight: 700;
    }

    a {
      font-size: 1.4rem;
      font-weight: 400;
      color: #ffeb3b;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>タイトル</h1>

    <p>
      <a href="https://drive.google.com/file/d/1_sjpTXSznTTidRkUMtFGZGmsO0zUUfrS/view?usp=drive_link" target="_blank" rel="noopener noreferrer">
        名前１
      </a>
    </p>
  </div>
</body>
</html>
